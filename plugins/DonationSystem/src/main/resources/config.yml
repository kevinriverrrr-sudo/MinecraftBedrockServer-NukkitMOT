# Donation ranks
ranks:
  vip:
    display-name: "§aVIP"
    prefix: "§a[VIP] "
    priority: 10
    duration: 2592000  # 30 days in seconds (0 = permanent)
    permissions:
      - donate.perk.fly
      - donate.perk.hat
      - donate.perk.workbench
      - kit.vip
      - chat.color
      - chat.bold
